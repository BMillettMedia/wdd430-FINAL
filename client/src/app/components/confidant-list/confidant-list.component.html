<h2>Confidants</h2>

<div class="controls">

<label>Filter Game:</label>

<select [(ngModel)]="selectedGame" (change)="applyFilters()">

<option value="All">All</option>
<option value="Persona 3">Persona 3</option>
<option value="Persona 4">Persona 4</option>
<option value="Persona 5">Persona 5</option>

</select>

<label>Search:</label>

<input
  [(ngModel)]="searchTerm"
  (input)="applyFilters()"
  placeholder="Search confidant">

</div>

<hr>

<div *ngFor="let confidant of filteredConfidants" class="confidant-card">

<h3>{{ confidant.name }}</h3>

<p><strong>Arcana:</strong> {{ confidant.arcana }}</p>

<p><strong>Game:</strong> {{ confidant.game }}</p>

<p>Rank: {{ confidant.rank }}/{{ confidant.maxRank }}</p>

<div class="rank-bar">

<div
  class="rank-fill"
  [style.width.%]="(confidant.rank / confidant.maxRank) * 100">

</div>

</div>

<button [routerLink]="['/confidant', confidant._id]">View</button>
<button [routerLink]="['/confidant/edit', confidant._id]">Edit</button>
<button (click)="deleteConfidant(confidant._id!)">Delete</button>

</div>
