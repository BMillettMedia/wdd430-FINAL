<h2>Persona Confidants</h2>

<div *ngIf="loading">
  Loading confidants...
</div>

<div *ngIf="error">
  {{ error }}
</div>

<table *ngIf="!loading && confidants.length > 0" border="1">

  <thead>
    <tr>
      <th>Name</th>
      <th>Arcana</th>
      <th>Game</th>
      <th>Rank</th>
      <th>Max Rank</th>
      <th>Notes</th>
      <th>Save</th>
    </tr>
  </thead>

  <tbody>

    <tr *ngFor="let confidant of confidants">

      <td>{{ confidant.name }}</td>

      <td>{{ confidant.arcana }}</td>

      <td>{{ confidant.game }}</td>

      <td>{{ confidant.rank }}</td>

      <td>{{ confidant.maxRank }}</td>

      <td>
        <input
          type="text"
          [(ngModel)]="confidant.notes"
          style="width:200px"
        >
      </td>

      <td>
        <button (click)="saveNotes(confidant)">
          Save
        </button>
      </td>

    </tr>

  </tbody>

</table>

<div *ngIf="!loading && confidants.length === 0">
  No confidants found.
</div>
