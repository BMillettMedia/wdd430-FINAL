<h2>Confidant List</h2>

<a routerLink="/add">Add New Confidant</a>

<table border="1">

<tr>
<th>Name</th>
<th>Arcana</th>
<th>Game</th>
<th>Current Rank</th>
<th>Max Rank</th>
<th>Notes</th>
</tr>

<tr *ngFor="let confidant of confidants">

<td>{{ confidant.name }}</td>
<td>{{ confidant.arcana }}</td>
<td>{{ confidant.game }}</td>
<td>{{ confidant.rank }}</td>
<td>{{ confidant.maxRank }}</td>
<td>{{ confidant.notes }}</td>

</tr>

<td>
  <a [routerLink]="['/detail', confidants._id]">View</a>
<a [routerLink]="['/edit', confidants._id]">Edit</a>
</td>



</table>
