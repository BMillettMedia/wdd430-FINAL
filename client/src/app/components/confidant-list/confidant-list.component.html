<h2>Confidants</h2>

<table border="1">

<tr>
<th>Name</th>
<th>Arcana</th>
<th>Game</th>
<th>Rank</th>
<th>Actions</th>
</tr>

<tr *ngFor="let c of confidants">

<td>{{c.name}}</td>
<td>{{c.arcana}}</td>
<td>{{c.game}}</td>
<td>{{c.rank}} / {{c.maxRank}}</td>

<td>
<a [routerLink]="['/edit', c._id]">Edit</a>
</td>

</tr>

</table>
