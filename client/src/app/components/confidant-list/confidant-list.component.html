<h2>Confidant List</h2>

<a routerLink="/add">Add New Confidant</a>

<table border="1">

<tr>
<th>Name</th>
<th>Arcana</th>
<th>Game</th>
<th>Rank</th>
<th>Actions</th>
</tr>

<tr *ngFor="let c of confidants">

<td>{{c.name}}</td>
<td>{{c.arcana}}</td>
<td>{{c.game}}</td>
<td>{{c.rank}}</td>

<td>
  <a [routerLink]="['/detail', c._id]">View</a>
<a [routerLink]="['/edit', c._id]">Edit</a>
</td>

</tr>

</table>
